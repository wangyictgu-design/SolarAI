name: SolarAI
options:
  bundleIdPrefix: com.solarai
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: SolarAI/Application/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.solarai.inverter
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"

targets:
  SolarAI:
    type: application
    platform: iOS
    sources:
      - path: SolarAI
        excludes:
          - "**/.DS_Store"
    resources:
      - path: SolarAI/Resources
        excludes:
          - "**/.DS_Store"
    info:
      path: SolarAI/Application/Info.plist
    settings:
      base:
        PRODUCT_NAME: SolarAI
        INFOPLIST_FILE: SolarAI/Application/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: ""
